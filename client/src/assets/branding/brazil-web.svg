<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="landGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#24BE00;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#008600;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="routeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#001EA7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2351DC;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#F8F9FA" />
  
  <!-- Brazil outline -->
  <path d="M308,102 Q325,80 350,70 Q390,55 430,75 Q450,85 470,105 Q500,140 520,190 Q545,250 550,310 Q555,350 545,390 Q530,430 490,445 Q440,460 390,440 Q360,430 330,400 Q305,370 290,350 Q250,310 235,280 Q220,250 210,210 Q205,180 215,150 Q225,120 245,110 Q265,100 285,105 Q300,110 308,102 Z" 
        fill="url(#landGradient)" 
        stroke="#FFFFFF" 
        stroke-width="2" 
        filter="url(#dropShadow)" />
  
  <!-- Journey Route -->
  <path d="M330,120 Q350,140 370,165 Q390,190 410,230 Q430,270 445,320 Q455,360 460,400" 
        fill="none" 
        stroke="url(#routeGradient)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-dasharray="1, 0" />
  
  <!-- Progress indicator -->
  <circle cx="410" cy="230" r="8" fill="#FFFFFF" stroke="#001EA7" stroke-width="3" />
  
  <!-- Cities/Landmarks -->
  <g id="cities">
    <!-- Salvador -->
    <circle cx="330" cy="120" r="5" fill="#FFFFFF" stroke="#001EA7" stroke-width="2" />
    <text x="340" y="115" font-family="Open Sans, sans-serif" font-size="12" fill="#343A40">Salvador</text>
    
    <!-- Recife -->
    <circle cx="370" cy="165" r="5" fill="#FFFFFF" stroke="#001EA7" stroke-width="2" />
    <text x="380" y="160" font-family="Open Sans, sans-serif" font-size="12" fill="#343A40">Recife</text>
    
    <!-- Rio de Janeiro -->
    <circle cx="410" cy="230" r="5" fill="#FFFFFF" stroke="#24BE00" stroke-width="2" />
    <text x="420" y="225" font-family="Open Sans, sans-serif" font-size="12" font-weight="bold" fill="#008600">Rio de Janeiro</text>
    
    <!-- São Paulo -->
    <circle cx="445" cy="320" r="5" fill="#FFFFFF" stroke="#001EA7" stroke-width="2" />
    <text x="455" y="315" font-family="Open Sans, sans-serif" font-size="12" fill="#343A40">São Paulo</text>
    
    <!-- Porto Alegre -->
    <circle cx="460" cy="400" r="5" fill="#FFFFFF" stroke="#001EA7" stroke-width="2" />
    <text x="470" y="395" font-family="Open Sans, sans-serif" font-size="12" fill="#343A40">Porto Alegre</text>
  </g>
  
  <!-- Legend -->
  <rect x="580" y="100" width="170" height="150" rx="10" ry="10" fill="white" stroke="#E9ECEF" stroke-width="1" />
  <text x="665" y="130" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="14" font-weight="bold" fill="#343A40">Journey Map</text>
  
  <!-- Legend items -->
  <circle cx="600" cy="160" r="5" fill="#FFFFFF" stroke="#001EA7" stroke-width="2" />
  <text x="615" y="165" font-family="Open Sans, sans-serif" font-size="12" fill="#343A40">City</text>
  
  <circle cx="600" cy="190" r="5" fill="#FFFFFF" stroke="#24BE00" stroke-width="2" />
  <text x="615" y="195" font-family="Open Sans, sans-serif" font-size="12" fill="#343A40">Current Location</text>
  
  <line x1="580" y1="210" x2="600" y2="210" stroke="url(#routeGradient)" stroke-width="3" />
  <text x="615" y="215" font-family="Open Sans, sans-serif" font-size="12" fill="#343A40">Journey Route</text>
  
  <!-- Title -->
  <text x="400" y="460" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="16" font-weight="bold" fill="#001EA7">Our Journey Across Brazil</text>
  <text x="400" y="480" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="12" fill="#2351DC">Team progress: 1219km of 2900km completed</text>
</svg>