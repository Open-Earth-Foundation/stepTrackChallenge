<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="earthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001EA7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2351DC;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" />
  
  <!-- Earth Circle -->
  <circle cx="400" cy="200" r="150" fill="url(#earthGradient)" filter="glow" />
  
  <!-- Continents (simplified) -->
  <path d="M350,120 Q380,100 420,110 Q450,120 470,150 Q490,180 480,220 Q470,250 430,260 Q390,270 350,250 Q320,230 310,190 Q300,150 350,120" 
        fill="#24BE00" opacity="0.8" />
  <path d="M300,180 Q270,190 280,220 Q290,250 320,240 Q340,230 330,200 Q320,170 300,180" 
        fill="#24BE00" opacity="0.8" />
  <path d="M440,170 Q460,160 480,180 Q500,200 490,220 Q480,240 460,230 Q440,220 440,200 Q440,180 440,170" 
        fill="#24BE00" opacity="0.8" />
  
  <!-- Brazil Focus Area (highlighted) -->
  <path d="M370,220 Q380,210 390,220 Q400,230 415,225 Q430,220 435,230 Q440,240 430,250 Q420,260 405,255 Q390,250 380,240 Q370,230 370,220" 
        fill="#008600" stroke="#ffffff" stroke-width="2" opacity="0.9" />
  
  <!-- Route Line (to represent the challenge route) -->
  <path d="M350,220 Q370,215 390,225 Q410,235 430,230 Q450,225 470,235" 
        fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="5,3" />
  
  <!-- Current Position Marker -->
  <circle cx="390" cy="225" r="6" fill="#ffffff" stroke="#001EA7" stroke-width="2" />
  
  <!-- Text Labels -->
  <text x="390" y="350" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="16" font-weight="bold" fill="#001EA7">Brazil Coast Challenge</text>
  <text x="390" y="375" text-anchor="middle" font-family="Open Sans, sans-serif" font-size="14" fill="#2351DC">Track your team's progress across Brazil</text>
</svg>